name: NBA Surface Scan

on:
  schedule:
    # Every 6 hours during NBA season (Oct–Jun). Times in UTC.
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # Manual trigger via GitHub UI

permissions:
  contents: write # Required to commit updated JSON artifacts

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run NBA surface scan
        run: npm run scan:nba-surfaces

      - name: Generate summary
        run: npm run summarize:nba-surfaces

      - name: Run tests
        run: npm test

      - name: Commit updated scan artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capping-pro-nba-surfaces.json \
                  capping-pro-nba-surfaces.run-summary.json \
                  capping-pro-nba-surfaces.summary.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: automated NBA surface scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
